site_name: TerroirOS Docs
site_description: Documentation, architecture, APIs, research references, and contribution guidance for TerroirOS.
site_url: https://terroiros.github.io/docs/
repo_url: https://github.com/TerroirOS/docs
edit_uri: edit/main/docs/
docs_dir: docs
theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: green
      accent: amber
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
plugins:
  - search
nav:
  - Home: index.md
  - English:
